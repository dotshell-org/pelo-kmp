name: iosApp
options:
  bundleIdPrefix: eu.dotshell
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    exactVersion: 6.25.1
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pelo
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        NSLocationWhenInUseUsageDescription: "Pelo utilise votre position pour centrer la carte et calculer des itinéraires."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - eu.dotshell.pelo.telemetryUpload
          - eu.dotshell.pelo.trafficAlerts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.dotshell.pelo
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]: $(inherited) ../app/build/bin/iosArm64/debugFramework
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]: $(inherited) ../app/build/bin/iosSimulatorArm64/debugFramework
        # ComposeApp MUST be linked explicitly, and BEFORE MapLibre. Swift's `import
        # ComposeApp` only auto-links it (LC_LINKER_OPTION), which ld processes *after*
        # every command-line input — so MapLibre.framework, which publicly exports its
        # own HarfBuzz, would satisfy Skia/Skiko's hb_shape, hb_shape_full,
        # hb_ot_font_set_funcs and hb_shape_plan_destroy. The two HarfBuzz copies have
        # incompatible struct layouts, so the first text shaping segfaults
        # (EXC_BAD_ACCESS on 0x4c61746e… — the 'Latn' script tag read as a pointer).
        # Naming the static framework here puts it ahead of MapLibre on the link line,
        # so Skiko's own HarfBuzz wins. Resolved by name via FRAMEWORK_SEARCH_PATHS
        # above, so the right slice is picked for device vs simulator.
        OTHER_LDFLAGS: $(inherited) -framework ComposeApp
    dependencies:
      - package: MapLibre
        product: MapLibre
    preBuildScripts:
      - name: Build Compose framework (Kotlin/Native)
        basedOnDependencyAnalysis: false
        script: |
          export JAVA_HOME="$HOME/Library/Java/jdk-21.0.11+10/Contents/Home"
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          if [[ "$SDK_NAME" == *simulator* ]]; then
            "$PROJECT_DIR/../gradlew" -p "$PROJECT_DIR/.." :app:linkDebugFrameworkIosSimulatorArm64
          else
            "$PROJECT_DIR/../gradlew" -p "$PROJECT_DIR/.." :app:linkDebugFrameworkIosArm64
          fi
    postBuildScripts:
      - name: Copy Compose resources into the app bundle
        basedOnDependencyAnalysis: false
        script: |
          # Copy the whole prepared composeResources tree (files/ for FileSystem.ios +
          # drawable/ + values/ for the Compose Resources `Res` API) into the app bundle,
          # under the package-prefixed path the iOS Res reader expects:
          #   <bundle>/compose-resources/composeResources/<packageOfResClass>/...
          SRC="$PROJECT_DIR/../app/build/generated/compose/resourceGenerator/preparedResources/commonMain/composeResources"
          DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/compose-resources/composeResources/eu.dotshell.pelo.resources"
          if [ -d "$SRC" ]; then
            mkdir -p "$DST"
            rsync -a --delete "$SRC/" "$DST/"
            echo "Copied Compose resources -> $DST"
          else
            echo "warning: Compose resources not found at $SRC"
          fi
